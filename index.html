<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Photography Carousel</title>

<style>

body{
margin:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.carousel{
width:900px;
overflow:hidden;
position:relative;
border-radius:10px;
}

.track{
display:flex;
transition:transform .5s ease;
}

.track img{
width:900px;
flex-shrink:0;
}

button{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,.6);
color:white;
border:none;
font-size:30px;
padding:10px 16px;
cursor:pointer;
}

.prev{left:10px;}
.next{right:10px;}

.dots{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:8px;
}

.dots span{
width:12px;
height:12px;
background:#bbb;
border-radius:50%;
cursor:pointer;
}

.dots .active{
background:white;
}

</style>
</head>

<body>

<div class="carousel">

<div class="track" id="track">

<img src="Image1.jpg">
<img src="Image2.jpg">
<img src="Image3.jpg">
<img src="Image4.jpg">
<img src="Image5.jpg">
<img src="Image6.jpg">
<img src="Image7.jpg">
<img src="Image8.jpg">

</div>

<button class="prev" onclick="move(-1)">❮</button>
<button class="next" onclick="move(1)">❯</button>

<div class="dots" id="dots"></div>

</div>

<script>

const track=document.getElementById("track")
const slides=document.querySelectorAll(".track img")
const dots=document.getElementById("dots")

let index=0

slides.forEach((_,i)=>{
const dot=document.createElement("span")

if(i===0) dot.classList.add("active")

dot.onclick=()=>{
index=i
update()
}

dots.appendChild(dot)
})

function update(){

track.style.transform=`translateX(-${index*900}px)`

document.querySelectorAll(".dots span")
.forEach(d=>d.classList.remove("active"))

dots.children[index].classList.add("active")

}

function move(dir){

index+=dir

if(index<0) index=slides.length-1
if(index>=slides.length) index=0

update()

}

setInterval(()=>{
move(1)
},4000)

</script>

</body>
</html>
