<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photography Carousel</title>

<style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
  }

  .carousel {
    width: 90%;
    max-width: 900px;
    overflow: hidden;
    position: relative;
    border-radius: 10px;
    background: #000; /* prevents empty space around smaller images */
  }

  .track {
    display: flex;
    transition: transform 0.5s ease;
  }

  .track img {
    flex-shrink: 0;
    max-width: 100%;
    height: auto;       /* maintain native aspect ratio */
    object-fit: contain; /* scale image without cropping or stretching */
    display: block;
  }

  /* Buttons */
  .prev, .next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    font-size: 28px;
    padding: 10px 16px;
    cursor: pointer;
    border-radius: 6px;
    z-index: 10;
  }

  .prev { left: 10px; }
  .next { right: 10px; }

  /* Dots */
  .dots {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
  }

  .dots span {
    width: 12px;
    height: 12px;
    background: #bbb;
    border-radius: 50%;
    cursor: pointer;
  }

  .dots .active {
    background: white;
  }
</style>
</head>

<body>
<div class="carousel">
  <div class="track" id="track">
    <img src="Image1.jpg" alt="Image 1">
    <img src="Image2.jpg" alt="Image 2">
    <img src="Image3.jpg" alt="Image 3">
    <img src="Image4.jpg" alt="Image 4">
    <img src="Image5.jpg" alt="Image 5">
    <img src="Image6.jpg" alt="Image 6">
    <img src="Image7.jpg" alt="Image 7">
    <img src="Image8.jpg" alt="Image 8">
  </div>

  <button class="prev">❮</button>
  <button class="next">❯</button>

  <div class="dots" id="dots"></div>
</div>

<script>
window.addEventListener('load', () => {
  const track = document.getElementById("track");
  const slides = document.querySelectorAll(".track img");
  const dotsContainer = document.getElementById("dots");
  const prevBtn = document.querySelector(".prev");
  const nextBtn = document.querySelector(".next");
  let index = 0;

  // Create dots
  slides.forEach((_, i) => {
    const dot = document.createElement("span");
    if (i === 0) dot.classList.add("active");
    dot.addEventListener("click", () => {
      index = i;
      updateCarousel();
    });
    dotsContainer.appendChild(dot);
  });

  function updateCarousel() {
    const slideWidth = slides[0].clientWidth;
    track.style.transform = `translateX(-${index * slideWidth}px)`;

    const dots = dotsContainer.querySelectorAll("span");
    dots.forEach(dot => dot.classList.remove("active"));
    dots[index].classList.add("active");
  }

  function move(dir) {
    index += dir;
    if (index < 0) index = slides.length - 1;
    if (index >= slides.length) index = 0;
    updateCarousel();
  }

  // Buttons
  prevBtn.addEventListener("click", () => move(-1));
  nextBtn.addEventListener("click", () => move(1));

  // Autoplay every 4 seconds
  setInterval(() => move(1), 4000);

  // Initialize
  updateCarousel();

  // Responsive
  window.addEventListener("resize", updateCarousel);
});
</script>
</body>
</html>
